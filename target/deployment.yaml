apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-maven-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-maven-app
  template:
    metadata:
      labels:
        app: simple-maven-app
    spec:
      containers:
      - name: simple-maven-app
        image: boomika1030/simple-maven-app:1.0
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: simple-maven-service
spec:
  type: NodePort
  selector:
    app: simple-maven-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30008